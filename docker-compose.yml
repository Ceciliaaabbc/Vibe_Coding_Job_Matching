services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: job_agent
      POSTGRES_PASSWORD: job_agent
      POSTGRES_DB: job_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    depends_on:
      - postgres
      - chromadb
      - ollama
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
  uploads:
