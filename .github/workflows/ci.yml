name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: job_agent
          POSTGRES_PASSWORD: job_agent
          POSTGRES_DB: job_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U job_agent -d job_agent_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg://job_agent:job_agent@localhost:5432/job_agent_test
      TEST_DATABASE_URL: postgresql+psycopg://job_agent:job_agent@localhost:5432/job_agent_test
      VECTOR_STORE_ENABLED: "false"
      JWT_SECRET: ci-only-test-secret-change-outside-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Verify database migrations
        run: alembic upgrade head
      - name: Run unit and API integration tests
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: job_agent
          POSTGRES_PASSWORD: job_agent
          POSTGRES_DB: job_agent_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U job_agent -d job_agent_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://job_agent:job_agent@localhost:5432/job_agent_e2e
      VECTOR_STORE_ENABLED: "false"
      JWT_SECRET: ci-only-test-secret-change-outside-ci
      UPLOAD_DIR: /tmp/job-agent-e2e-uploads
      VITE_API_BASE_URL: http://127.0.0.1:8000
      CORS_ORIGINS: '["http://127.0.0.1:5173"]'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Apply database migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run complete browser workflow
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14
